<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace | Private Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --side: #161b22;
            --card: #21262d;
            --text: #ecf2f8;
            --dim: #8b949e;
            --accent: #238636;
            --border: #30363d;
            --shadow: rgba(0,0,0,0.5);
        }

        .light-theme {
            --bg: #f6f8fa;
            --side: #ffffff;
            --card: #ffffff;
            --text: #24292f;
            --dim: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --shadow: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        body, html { height: 100vh; width: 100vw; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s ease; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .login-card {
            background: var(--side); padding: 40px; border-radius: 16px; 
            border: 1px solid var(--border); width: 360px; text-align: center;
            box-shadow: 0 20px 50px var(--shadow);
        }

        /* Layout */
        .app { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        aside {
            width: 280px; background: var(--side); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 24px;
        }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--accent); margin-bottom: 40px; letter-spacing: -0.5px; }
        
        /* Main Chat Area */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        header {
            height: 70px; padding: 0 30px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--side);
        }

        #chat-stream {
            flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth; background: var(--bg);
        }

        /* Message Bubbles */
        .msg-wrap { max-width: 75%; display: flex; flex-direction: column; gap: 4px; animation: slideUp 0.3s ease; }
        .msg-bubble { 
            padding: 12px 18px; border-radius: 14px; background: var(--card); 
            border: 1px solid var(--border); line-height: 1.6; font-size: 0.95rem;
            box-shadow: 0 2px 5px var(--shadow);
        }
        .user-tag { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-left: 4px; }

        /* Input Bar */
        footer { padding: 25px 35px; background: var(--side); border-top: 1px solid var(--border); display: flex; gap: 15px; }
        
        input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 14px 20px; border-radius: 10px; outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35, 134, 54, 0.2); }

        .btn {
            background: var(--accent); color: white; border: none; padding: 0 25px;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-mode { background: transparent; border: 1px solid var(--border); color: var(--dim); font-size: 0.8rem; padding: 8px 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 8px;">Private Hub</h2>
            <p style="color: var(--dim); font-size: 0.9rem; margin-bottom: 25px;">Enter your workspace identity.</p>
            <input type="text" id="user-input" placeholder="Display Name" style="width: 100%; margin-bottom: 15px;">
            <button class="btn" style="width: 100%; height: 45px;" onclick="enterApp()">Connect Now</button>
        </div>
    </div>

    <div class="app">
        <aside>
            <div class="logo">PRIVATE_IO</div>
            <div style="color: var(--dim); font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; letter-spacing: 1px;">CHANNELS</div>
            <div style="font-weight: 600; padding: 8px 12px; background: var(--card); border-radius: 8px; color: var(--accent); cursor: default;"># general-chat</div>
            
            <div style="margin-top: auto;">
                <button class="btn btn-mode" style="width: 100%;" onclick="document.body.classList.toggle('light-theme')">🌓 Switch Theme</button>
            </div>
        </aside>

        <main>
            <header>
                <div style="font-weight: 700; font-size: 1.1rem;"># general-chat</div>
                <div id="status-user" style="font-size: 0.85rem; color: var(--dim);">Connecting...</div>
            </header>

            <div id="chat-stream"></div>

            <footer>
                <input type="text" id="msg-input" placeholder="Message #general-chat..." onkeypress="if(event.key === 'Enter') broadcast()">
                <button class="btn" onclick="broadcast()">Send</button>
            </footer>
        </main>
    </div>

    <script>
        // Start Gun.js (Serverless P2P Relay)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const channel = gun.get('clean-minimal-room-2026'); // Room ID - Change this to start a fresh room
        
        let currentUser = "Guest";

        function enterApp() {
            const name = document.getElementById('user-input').value.trim();
            if (name) {
                currentUser = name;
                document.getElementById('status-user').innerText = `Logged as: ${currentUser}`;
                document.getElementById('login-overlay').style.display = 'none';
            }
        }

        function broadcast() {
            const inp = document.getElementById('msg-input');
            if (!inp.value.trim()) return;

            channel.set({
                sender: currentUser,
                content: inp.value,
                timestamp: Date.now()
            });
            inp.value = "";
        }

        // Real-time listener
        channel.map().once(function(data) {
            if (data && data.content) {
                const stream = document.getElementById('chat-stream');
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrap';
                wrap.innerHTML = `
                    <span class="user-tag">${data.sender}</span>
                    <div class="msg-bubble">${data.content}</div>
                `;
                stream.appendChild(wrap);
                stream.scrollTop = stream.scrollHeight;
            }
        });
    </script>
</body>
</html>
