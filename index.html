<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --text: #ecf2f8; --accent: #238636; --border: #30363d; }
        .light-theme { --bg: #ffffff; --side: #f6f8fa; --text: #24292f; --accent: #0969da; --border: #d0d7de; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { height: 100vh; width: 100vw; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .card { background: var(--side); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        
        .app { display: flex; height: 100vh; }
        aside { width: 250px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; background: var(--side); border: 1px solid var(--border); border-radius: 8px; max-width: 80%; }
        .msg b { color: var(--accent); display: block; font-size: 0.8rem; }

        footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h3>Enter Workspace</h3>
        <input type="text" id="username" placeholder="Username" style="width:100%; margin: 15px 0;">
        <button onclick="join()" style="width:100%">Connect</button>
    </div>
</div>

<div class="app">
    <aside>
        <h2 style="color:var(--accent)">Chat_v2</h2>
        <p id="status" style="font-size: 0.7rem; color: gray;">Connecting to peers...</p>
        <button onclick="document.body.classList.toggle('light-theme')" style="margin-top:auto; background:none; border:1px solid var(--border); color:var(--text); padding:5px; cursor:pointer;">Toggle Theme</button>
    </aside>
    <main>
        <div id="messages"></div>
        <footer>
            <input type="text" id="input" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </footer>
    </main>
</div>

<script>
    // Multiple relays for better reliability
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wall.org/gun',
        'https://gun-us.herokuapp.com/gun'
    ]);

    // Use a VERY unique room name so your messages don't mix with others
    const room = gun.get('dbstudios_private_room_unique_999'); 
    let user = "Guest";

    function join() {
        const n = document.getElementById('username').value;
        if(n) { user = n; document.getElementById('login').style.display='none'; }
    }

    function send() {
        const i = document.getElementById('input');
        if(!i.value) return;
        room.set({ name: user, msg: i.value, time: Date.now() });
        i.value = "";
    }

    // This handles receiving messages
    room.map().once((data, id) => {
        if(data && data.msg) {
            document.getElementById('status').innerText = "🟢 Connected to Peers";
            const m = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${data.name}</b> ${data.msg}`;
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        }
    });
</script>
</body>
</html>
