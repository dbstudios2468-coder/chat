<!DOCTYPE html>
<html>
<head>
    <title>Private Room</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body style="background:#111; color:#0f0; font-family:monospace;">
    <div id="messages" style="height:300px; overflow-y:scroll; border:1px solid #333; padding:10px;"></div>
    <input id="input" placeholder="Type a message..." style="width:80%; background:#222; color:#fff; border:1px solid #444; padding:5px;">
    <button onclick="send()">Send</button>

    <script>
        // Connect to the decentralized network
        var gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        var chat = gun.get('secret-room-name-123'); // CHANGE THIS to something unique

        function send() {
            var msg = document.getElementById('input').value;
            chat.set({ body: msg, time: Date.now() });
            document.getElementById('input').value = '';
        }

        chat.map().once(function(data) {
            if(data && data.body) {
                var div = document.createElement('div');
                div.innerText = "> " + data.body;
                document.getElementById('messages').appendChild(div);
            }
        });
    </script>
</body>
</html>
