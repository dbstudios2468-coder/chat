<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace_Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/bugout/github.com/chr15m/bugout/index.js"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --text: #c9d1d9; --accent: #238636; --border: #30363d; }
        .light { --bg: #ffffff; --side: #f6f8fa; --text: #24292f; --accent: #0969da; --border: #d0d7de; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body, html { height: 100vh; width: 100vw; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.2s; }

        /* Setup Screen */
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .setup-card { background: var(--side); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 320px; text-align: center; }

        /* Main UI */
        .layout { display: flex; height: 100vh; }
        aside { width: 240px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; flex-direction: column; }
        
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        .bubble { padding: 10px 14px; background: var(--side); border: 1px solid var(--border); border-radius: 10px; max-width: 80%; align-self: flex-start; }
        .bubble b { color: var(--accent); display: block; font-size: 0.75rem; margin-bottom: 3px; }

        footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="setup">
    <div class="setup-card">
        <h2 style="margin-bottom: 15px;">Private Node</h2>
        <input type="text" id="username" placeholder="Username" style="width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: white;">
        <button onclick="connect()" style="width: 100%;">Initialize</button>
    </div>
</div>

<div class="layout">
    <aside>
        <div style="font-weight: 800; color: var(--accent); margin-bottom: 30px;">COMM_P2P</div>
        <div id="status" style="font-size: 0.7rem; opacity: 0.6;">Status: Offline</div>
        <button onclick="document.body.classList.toggle('light')" style="margin-top: auto; background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 5px; cursor: pointer;">🌓 Theme</button>
    </aside>
    <main>
        <header>
            <div style="font-weight: bold;"># general-node</div>
            <div id="peer-count" style="font-size: 0.75rem; opacity: 0.6;">Peers: 0</div>
        </header>
        <div id="chat"></div>
        <footer>
            <input type="text" id="message" placeholder="Secure message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </footer>
    </main>
</div>

<script>
    let b;
    let username = "User";

    function connect() {
        const u = document.getElementById('username').value;
        if (!u) return;
        username = u;
        document.getElementById('setup').style.display = 'none';
        
        // Initialize P2P Swarm
        // IMPORTANT: The string 'dbstudios-private-room-v1' is your room key. 
        // Everyone must have the same key to see each other.
        b = new Bugout('dbstudios-private-room-v1');

        b.on("seen", (address) => {
            document.getElementById('status').innerText = "Status: Online";
            updatePeerCount();
        });

        b.on("message", (address, data) => {
            if (data.user && data.text) {
                addMessage(data.user, data.text);
            }
        });
    }

    function send() {
        const input = document.getElementById('message');
        if (!input.value) return;
        
        const data = { user: username, text: input.value };
        b.send(data); // Sends to everyone in the swarm
        addMessage(username, input.value); // Add to local screen
        input.value = "";
    }

    function addMessage(user, text) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'bubble';
        div.innerHTML = `<b>${user}</b> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function updatePeerCount() {
        const count = Object.keys(b.peers).length;
        document.getElementById('peer-count').innerText = `Peers: ${count}`;
    }
</script>
</body>
</html>
